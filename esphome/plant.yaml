# Plant Module — ESP32-C3 SuperMini
# Hardware: Adafruit STEMMA Soil Sensor (I2C), solenoid valve (relay), WS2812B 9-LED strip
#
# GPIO assignments:
#   GPIO2 — WS2812B LED data
#   GPIO3 — Valve relay (active HIGH)
#   GPIO8 — I2C SDA (Stemma soil sensor)
#   GPIO9 — I2C SCL (Stemma soil sensor)

substitutions:
  device_id: "plant_01" # Change per device — used in all MQTT topics

esphome:
  name: "plant-${device_id}"
  friendly_name: "Plant Module ${device_id}"
  on_boot:
    priority: -100
    then:
      - switch.turn_off: valve_relay

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

# ── WiFi ──────────────────────────────────────────────────────────────────────

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "plant-${device_id}-fallback"
    password: !secret ota_password

captive_portal:

# ── OTA + Logging ─────────────────────────────────────────────────────────────

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# ── MQTT ──────────────────────────────────────────────────────────────────────

mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  client_id: "plant-${device_id}"
  discovery: false
  birth_message:
    topic: "plants/${device_id}/availability"
    payload: "online"
    retain: true
  will_message:
    topic: "plants/${device_id}/availability"
    payload: "offline"
    retain: true
  on_connect:
    - mqtt.publish:
        topic: "plants/${device_id}/availability"
        payload: "online"
        retain: true
  on_message:
    # ── Valve command ────────────────────────────────────────────────────
    - topic: "plants/${device_id}/cmd/valve_open"
      then:
        - lambda: |-
            auto doc = JsonDocument();
            DeserializationError err = deserializeJson(doc, x.c_str());
            if (err) {
              ESP_LOGW("plant", "valve cmd parse error: %s", err.c_str());
              return;
            }
            bool open_valve = doc["open"].as<bool>();
            int max_s = doc["max_open_s"] | 10;
            if (max_s <= 0 || max_s > 120) max_s = 120;

            if (open_valve) {
              id(valve_relay).turn_on();
              id(valve_timeout_s) = max_s;
              id(valve_timer).execute();
            } else {
              id(valve_relay).turn_off();
              id(valve_timer).stop();
            }

    # ── LED command ──────────────────────────────────────────────────────
    - topic: "plants/${device_id}/cmd/led"
      then:
        - lambda: |-
            auto doc = JsonDocument();
            DeserializationError err = deserializeJson(doc, x.c_str());
            if (err) {
              ESP_LOGW("plant", "led cmd parse error: %s", err.c_str());
              return;
            }
            std::string mode = doc["mode"] | "solid";
            float brightness = doc["brightness"] | 1.0f;
            if (brightness < 0.0f) brightness = 0.0f;
            if (brightness > 1.0f) brightness = 1.0f;

            auto call = id(led_strip).make_call();
            call.set_brightness(brightness);
            call.set_state(true);

            if (mode == "solid") {
              const char* hex = doc["color"] | "#FFFFFF";
              uint32_t color = strtoul(hex + 1, nullptr, 16);
              uint8_t r = (color >> 16) & 0xFF;
              uint8_t g = (color >> 8)  & 0xFF;
              uint8_t b = color & 0xFF;
              call.set_rgb(r / 255.0f, g / 255.0f, b / 255.0f);
              call.set_effect("None");
            } else if (mode == "bar") {
              call.set_effect("Moisture Bar (Blue)");
            } else if (mode == "effect") {
              const char* eff = doc["effect"] | "rainbow";
              call.set_effect(eff);
            }
            call.perform();

# ── External Components ────────────────────────────────────────────────────────

external_components:
  - source:
      type: local
      path: custom_components
    components: [stemma_soil_sensor]

# ── I2C ───────────────────────────────────────────────────────────────────────

i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true
  id: i2c_bus

# ── Sensors ───────────────────────────────────────────────────────────────────

sensor:
  - platform: stemma_soil_sensor
    id: stemma_sensor
    address: 0x36
    update_interval: never
    temperature:
      id: soil_temperature
      name: "Soil Temperature"
    moisture:
      id: soil_moisture_raw
      name: "Soil Moisture (raw)"

  # Convert raw moisture to percent using two calibration points.
  # Update interval is managed by the moisture_publisher interval below.
  - platform: template
    name: "Soil Moisture (%)"
    id: soil_moisture_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      const float DRY = 300.0;   // <-- CHANGE: raw value when totally dry
      const float WET = 1000.0;  // <-- CHANGE: raw value when very wet
      float x = id(soil_moisture_raw).state;
      if (isnan(x)) return NAN;

      float pct = (x - DRY) * 100.0f / (WET - DRY);
      if (pct < 0) pct = 0;
      if (pct > 100) pct = 100;
      return pct;

# ── Switches ──────────────────────────────────────────────────────────────────

switch:
  - platform: gpio
    id: valve_relay
    name: "Valve"
    pin:
      number: GPIO3
      mode:
        output: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: "id(moisture_tick) = 0;"
      - mqtt.publish_json:
          topic: "plants/${device_id}/state/valve"
          payload: |-
            root["open"] = true;
          retain: true
    on_turn_off:
      - mqtt.publish_json:
          topic: "plants/${device_id}/state/valve"
          payload: |-
            root["open"] = false;
          retain: true

# ── Light (WS2812B NeoPixel) ─────────────────────────────────────────────────

light:
  - platform: esp32_rmt_led_strip
    id: led_strip
    name: "Plant LEDs"
    pin: GPIO2
    num_leds: 9
    rgb_order: GRB
    chipset: ws2812
    effects:
      - addressable_lambda:
          name: "Moisture Bar (Blue)"
          update_interval: 500ms
          lambda: |-
            const int N = 9;
            float pct = id(soil_moisture_pct).state;

            if (isnan(pct)) {
              it.all() = Color(0, 0, 0);
              return;
            }

            int filled = (int) lroundf((pct / 100.0f) * N);
            if (filled < 0) filled = 0;
            if (filled > N) filled = N;

            it.all() = Color(0, 0, 0);

            // Fill bar in BLUE (from bottom = index 0 upward)
            for (int i = 0; i < filled; i++) {
              it[N - 1 - i] = Color(0, 0, 255);
            }

            // Critical dry warning: blink BOTTOM LED (index 0)
            if (pct < 15.0f) {
              static bool blink = false;
              blink = !blink;
              it[0] = blink ? Color(255, 0, 0) : Color(0, 0, 0);
            }
      - addressable_rainbow:
      - addressable_color_wipe:
      - addressable_twinkle:

# ── Globals ───────────────────────────────────────────────────────────────────

globals:
  - id: valve_timeout_s
    type: int
    restore_value: false
    initial_value: "10"
  - id: moisture_tick
    type: int
    restore_value: false
    initial_value: "0"

# ── Moisture publish interval ────────────────────────────────────────────────
# 1s when valve is open, 10s when closed.

interval:
  - interval: 1s
    then:
      - lambda: |-
          bool valve_open = id(valve_relay).state;
          int interval = valve_open ? 1 : 10;
          id(moisture_tick) += 1;
          if (id(moisture_tick) >= interval) {
            id(moisture_tick) = 0;
            id(stemma_sensor).update();
            id(soil_moisture_pct).update();
            float pct = id(soil_moisture_pct).state;
            if (!isnan(pct)) {
              id(mqtt_client)
                ->publish_json("plants/${device_id}/tele/moisture_percent",
                  [=](JsonObject root) { root["value"] = pct; });
            }
          }

# ── Scripts ───────────────────────────────────────────────────────────────────

script:
  # Valve auto-close timer — restart mode resets countdown on new commands
  - id: valve_timer
    mode: restart
    then:
      - delay: !lambda return id(valve_timeout_s) * 1000;
      - switch.turn_off: valve_relay
